<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Surprise Box 🎉</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="surprise-container">
        <h1>🎊 Surprise, Annette! 🎊</h1>
        <p>Here’s a special birthday video just for you 💖</p>

        <div class="video-card">
            <video controls>
                <source src="images/Video.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>

        <button onclick="window.location.href='gifts.html'">Back to Gifts</button>
    </div>

    <!-- Background music -->
    <audio id="bgMusic" loop>
        <source src="images/bg-music.mp3" type="audio/mpeg">
    </audio>

    <!-- Script for persistent background music -->
    <script>
        const bgMusic = document.getElementById("bgMusic");

        window.addEventListener("load", () => {
            const savedTime = localStorage.getItem("musicTime");
            const wasPlaying = localStorage.getItem("musicPlaying");

            bgMusic.volume = 0.05; // soft background

            if (savedTime) {
                bgMusic.currentTime = parseFloat(savedTime);
            }

            if (wasPlaying === "true") {
                bgMusic.play().catch(() => {});
            }
        });

        setInterval(() => {
            localStorage.setItem("musicTime", bgMusic.currentTime);
        }, 1000);

        bgMusic.addEventListener("play", () => {
            localStorage.setItem("musicPlaying", "true");
        });

        bgMusic.addEventListener("pause", () => {
            localStorage.setItem("musicPlaying", "false");
        });

        // Start music after first user interaction
        document.addEventListener("click", () => {
            if (bgMusic.paused) {
                bgMusic.play().catch(() => {});
            }
        }, { once: true });
    </script>

</body>
</html>
